---
name: instagram-downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Instagram URLs – separate by comma, space, or newline'
        required: true

jobs:
  actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ---------- extract URLs from input ----------
      - name: Parse input and extract URLs
        id: parse
        run: |
          INPUT="${{ github.event.inputs.urls }}"
          CLEANED=$(echo "$INPUT" | tr -d '"'\')
          URLS=$(echo "$CLEANED" | grep -oP 'https?://(www\.)?instagram\.com/[^\s,;]+' | sort -u)
          if [ -z "$URLS" ]; then
            echo "ERROR: No Instagram URLs found in the input."
            exit 1
          fi
          echo "$URLS" > urls.txt
          echo "Found $(wc -l < urls.txt) URL(s) to download."

      # ---------- write cookies from secrets ----------
      - name: Write cookies from secrets
        run: |
          if [ -n "$INSTAGRAM_COOKIES" ]; then
            echo "$INSTAGRAM_COOKIES" > instagram-cookies.txt
            echo "Instagram cookies written."
          else
            echo "No INSTAGRAM_COOKIES secret found – proceeding without login, may fail for private content."
          fi
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}

      # ---------- cache & install tools ----------
      - name: Restore cached tools
        uses: actions/cache@v4
        id: tool-cache
        with:
          path: |
            ~/.local/bin/yt-dlp
            ~/.deno
            ~/.cache/pip
          key: fetch-tools-${{ runner.os }}-v3

      - name: Add cached tools to PATH
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install tools
        run: |
          # Python packages: yt-dlp (needed by gallery-dl) and gallery-dl itself
          pip install yt-dlp gallery-dl

          # yt-dlp binary (optional, kept for potential fallback)
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi

          # jq & ffmpeg
          if ! command -v jq &> /dev/null || ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq ffmpeg
          fi

          # Deno (optional)
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
            echo "$HOME/.deno/bin" >> $GITHUB_PATH
          fi

      # ---------- download all Instagram URLs ----------
      - name: Download Instagram content
        run: |
          mkdir -p instagram_downloads

          GALLERY_DL_ARGS=""
          if [ -f "instagram-cookies.txt" ]; then
            GALLERY_DL_ARGS="$GALLERY_DL_ARGS --cookies instagram-cookies.txt"
          fi

          gallery-dl $GALLERY_DL_ARGS \
                     --input-file urls.txt \
                     -d "instagram_downloads" \
                     --verbose

          echo "Downloads finished. Contents:"
          ls -lhR instagram_downloads/

      # ---------- remux videos (if any) ----------
      - name: Remux videos (if needed)
        run: |
          find instagram_downloads -type f \( -iname "*.mp4" -o -iname "*.webm" -o -iname "*.mkv" \) | while read -r f; do
            echo "Processing $f"
            FIXED="${f%/*}/fixed_${f##*/}"
            ffmpeg -i "$f" -c copy "$FIXED" -y && mv "$FIXED" "$f" || echo "Remux failed for $f, keeping original."
          done

      # ---------- create flat ZIP (instagram-content/ folder inside) ----------
      - name: Create ZIP archive
        id: zip
        run: |
          rm -rf zipcontent
          mkdir -p zipcontent/instagram-content

          # Flatten: copy each file to instagram-content/ with a unique name
          find instagram_downloads -type f | while read -r f; do
            rel="${f#instagram_downloads/}"
            flat_name="${rel//\//_}"
            cp "$f" "zipcontent/instagram-content/${flat_name}"
          done

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ZIP_NAME="instagram-contents-${TIMESTAMP}.zip"

          cd zipcontent
          zip -s 99m -r "../${ZIP_NAME}" "instagram-content"
          cd ..

          mkdir -p instagram
          mv ${ZIP_NAME}* instagram/

          echo "Created archive(s):"
          ls -lh instagram/

      # ---------- upload to repository ----------
      - name: Upload to 'instagram' folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          if [ ! -d "instagram" ] || [ -z "$(ls -A instagram)" ]; then
            echo "Nothing to upload."
            exit 0
          fi

          git add instagram/
          git commit -m "Add Instagram batch download [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done
          echo "All files uploaded to the 'instagram' folder."
